name: Validate Token List PR

on:
  pull_request_target:
    paths:
      - 'tokenlist.json'
      - 'assets/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout base branch (scripts only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR data files into workspace
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          git checkout pr-head -- tokenlist.json assets/ || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Validate tokenlist & assets
        run: python3 .github/scripts/validate.py

      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Comment result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.bot-token.outputs.token }}
          script: |
            const fs = require('fs')
            let body = '## Token List Validation\n\n'
            try {
              const result = fs.readFileSync('/tmp/validation_result.txt', 'utf8')
              body += result
            } catch {
              body += '> Validation script did not produce output.'
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            })
